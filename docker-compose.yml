services:
  web:
    build: .
    command: python manage.py runserver 0.0.0.0:8000
    working_dir: /app/src
    env_file:
      - .env
    ports:
      - "8000:8000"
    depends_on:
      - db
      - redis
    volumes:
      - ./src:/app/src

  celery_worker:
    build: .
    command: celery -A config worker -l info
    working_dir: /app/src
    env_file:
      - .env
    depends_on:
      - db
      - redis
    volumes:
      - ./src:/app/src

  celery_beat:
    build: .
    command: celery -A config beat -l info
    working_dir: /app/src
    env_file:
      - .env
    depends_on:
      - db
      - redis
    volumes:
      - ./src:/app/src

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: currency_db
      POSTGRES_USER: currency_user
      POSTGRES_PASSWORD: currency_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  postgres_data:
